name: Diagnose board canvas theme tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-canvas-theme
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply board canvas theme
        shell: bash
        run: |
          set -e
          node scripts/apply-board-canvas-theme.mjs
          rm -f scripts/apply-board-canvas-theme.mjs
          npm exec prettier -- --write \
            src/renderer/src/assets/main.css \
            src/renderer/src/modules/boards/components/BoardCanvas.tsx \
            src/renderer/src/modules/boards/components/BoardCanvas.test.tsx \
            src/renderer/src/modules/boards/components/BoardCanvasTheme.test.ts \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts > /dev/null
      - name: Diagnose affected tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm exec vitest -- run \
            src/renderer/src/modules/boards/components/BoardCanvas.test.tsx \
            src/renderer/src/modules/boards/components/BoardCanvasTheme.test.ts \
            --reporter=json --outputFile=test-results.json > vitest-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            node <<'NODE' > test-summary.txt
          const fs = require('node:fs')
          const report = JSON.parse(fs.readFileSync('test-results.json', 'utf8'))
          const ansi = /\u001b\[[0-9;]*m/g
          const lines = []
          for (const suite of report.testResults ?? []) {
            const suiteMessage = [suite.message, suite.failureMessage, ...(suite.failureMessages ?? [])]
              .filter(Boolean)
              .join('\n')
              .replace(ansi, '')
            if (suite.status === 'failed' || suiteMessage) {
              lines.push(`SUITE: ${suite.name ?? suite.testFilePath ?? 'unknown suite'}`)
              lines.push(suiteMessage.slice(0, 5000))
            }
            for (const assertion of suite.assertionResults ?? []) {
              if (assertion.status !== 'failed') continue
              const raw = (assertion.failureMessages ?? []).join('\n').replace(ansi, '')
              lines.push(`${suite.name} :: ${assertion.fullName ?? assertion.title ?? 'failed test'}`)
              lines.push(raw.split('Ignored nodes:')[0].trim().slice(0, 5000))
              lines.push('')
            }
          }
          if (lines.length === 0) {
            lines.push('RAW JSON REPORT:')
            lines.push(JSON.stringify(report, null, 2).slice(0, 7000))
            lines.push('VITEST OUTPUT:')
            lines.push(fs.readFileSync('vitest-output.txt', 'utf8').replace(ansi, '').slice(-5000))
          }
          process.stdout.write(lines.join('\n'))
          NODE
            {
              echo "Привязать tldraw к теме MyMind и перенести полноэкранную кнопку в быстрые действия."
              echo
              echo "## Временная диагностика тестов"
              echo '```text'
              cat test-summary.txt
              echo '```'
            } > pr-body.md
            gh pr edit 30 --body-file pr-body.md
            exit "$status"
          fi
