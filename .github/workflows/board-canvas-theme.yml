name: Verify board canvas theme

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-canvas-theme
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply board canvas theme
        shell: bash
        run: |
          set -e
          node scripts/apply-board-canvas-theme.mjs
          rm -f scripts/apply-board-canvas-theme.mjs
          npm exec prettier -- --write \
            src/renderer/src/assets/main.css \
            src/renderer/src/modules/boards/components/BoardCanvas.tsx \
            src/renderer/src/modules/boards/components/BoardCanvas.test.tsx \
            src/renderer/src/modules/boards/components/BoardCanvasTheme.test.ts \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - name: Commit verified source
        shell: bash
        run: |
          set -e
          rm -f .github/workflows/board-canvas-theme.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Адаптировать интерфейс доски к теме MyMind"
          git push origin HEAD:agent/board-canvas-theme
