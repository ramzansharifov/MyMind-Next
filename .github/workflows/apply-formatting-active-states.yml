name: Apply formatting active states

on:
  push:
    branches: [agent/formatting-active-states]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/emphasize-formatting-active-states.cjs
      - name: Commit active states
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
          git rm scripts/emphasize-formatting-active-states.cjs
          git commit -m "Emphasize active formatting controls"
          git push
