name: Diagnose root drop hover highlight

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-root-drop-hover-state
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply root drop highlight fix
        shell: bash
        run: |
          set -e
          node scripts/fix-root-drop-highlight.mjs
          npm exec prettier -- --write \
            src/renderer/src/modules/boards/components/BoardTree.tsx \
            src/renderer/src/modules/study/components/StudyTree.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.test.tsx \
            scripts/fix-root-drop-highlight.mjs > /dev/null
      - name: Lint changed files
        run: >-
          npm exec eslint --
          src/renderer/src/modules/boards/components/BoardTree.tsx
          src/renderer/src/modules/study/components/StudyTree.tsx
          src/renderer/src/shared/ui/ModuleTreeDndFeedback.tsx
          src/renderer/src/shared/ui/ModuleTreeDndFeedback.test.tsx
          scripts/fix-root-drop-highlight.mjs
