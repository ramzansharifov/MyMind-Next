name: Diagnose root drop hover highlight

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-root-drop-hover-state
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply root drop highlight fix
        shell: bash
        run: |
          set -e
          node scripts/fix-root-drop-highlight.mjs
          npm exec prettier -- --write \
            src/renderer/src/modules/boards/components/BoardTree.tsx \
            src/renderer/src/modules/study/components/StudyTree.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.test.tsx \
            scripts/fix-root-drop-highlight.mjs > /dev/null
      - name: Diagnose lint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm exec eslint -- \
            src/renderer/src/modules/boards/components/BoardTree.tsx \
            src/renderer/src/modules/study/components/StudyTree.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.test.tsx \
            scripts/fix-root-drop-highlight.mjs > lint-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Подсветка корневой области теперь зависит напрямую от isOver dnd-kit. Рамка двухпиксельная, пунктирная и использует текущий акцентный цвет без фоновой заливки."
              echo
              echo "## Временная диагностика ESLint"
              echo '```text'
              cat lint-output.txt
              echo '```'
            } > pr-body.md
            gh pr edit 27 --body-file pr-body.md
            exit "$status"
          fi
