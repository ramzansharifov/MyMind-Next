name: Verify study sidebar

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/study-sidebar-vscode
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply study sidebar improvements
        shell: bash
        run: |
          set -e
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'scripts/apply-study-sidebar-vscode.mjs'
          const source = fs.readFileSync(path, 'utf8')
          const marker = 'const studyTreeItemReplacement = String.raw`'
          const start = source.indexOf(marker)
          const bodyStart = start + marker.length
          const replaceCall = source.indexOf('\n\nreplaceBetween(', bodyStart)
          const bodyEnd = source.lastIndexOf('`', replaceCall)

          if (start < 0 || replaceCall < 0 || bodyEnd < bodyStart) {
            throw new Error('Unable to prepare StudyTree replacement')
          }

          const body = source
            .slice(bodyStart, bodyEnd)
            .replaceAll('`', '\\`')
            .replaceAll('${', '\\${')
          let prepared = `${source.slice(0, start)}const studyTreeItemReplacement = \`${body}${source.slice(bodyEnd)}`

          prepared = prepared.replace(
            "  position: 0,\n  createdAt: 1,\n  updatedAt: 1\n}\n\nfunction renderTree",
            "  position: 0,\n  isExpanded: false,\n  createdAt: 1,\n  updatedAt: 1\n}\n\nfunction renderTree"
          )

          fs.writeFileSync(path, prepared)
          NODE
          node scripts/apply-study-sidebar-vscode.mjs
          rm -f scripts/apply-study-sidebar-vscode.mjs
          rm -f .github/workflows/verify-study-sidebar-vscode.yml
          npm exec prettier -- --write \
            src/renderer/src/assets/main.css \
            src/renderer/src/shared/ui/ModuleSidebar.tsx \
            src/renderer/src/shared/ui/ModuleSidebar.test.tsx \
            src/renderer/src/modules/study/StudyPage.tsx \
            src/renderer/src/modules/study/components/StudyTree.tsx \
            src/renderer/src/modules/study/components/StudyTree.test.tsx
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - name: Run typecheck
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Сделать дерево обучения полноширинным, добавить линии вложенности и контекстное меню по правому клику."
              echo
              echo "## Диагностика TypeScript"
              echo '```text'
              tail -n 160 typecheck.log
              echo '```'
            } > pr-body.md
            gh pr edit 31 --body-file pr-body.md
            exit "$status"
          fi
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - name: Commit verified source
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Улучшить сайдбар модуля обучения"
          git push origin HEAD:agent/study-sidebar-vscode
