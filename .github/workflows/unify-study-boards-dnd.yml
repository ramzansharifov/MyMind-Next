name: Unify study and boards drag visuals

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-study-boards-dnd
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply unified tree drag visuals
        shell: bash
        run: |
          set -e
          node scripts/unify-study-boards-dnd.mjs
          node <<'NODE'
          const fs = require('node:fs')
          const paths = [
            'src/renderer/src/modules/study/components/StudyTree.tsx',
            'src/renderer/src/modules/boards/components/BoardTree.tsx'
          ]

          for (const path of paths) {
            const source = fs
              .readFileSync(path, 'utf8')
              .replace(
                '  getModuleTreeNodeDropContainerClassName,',
                '  MODULE_TREE_NODE_INSIDE_DROP_CLASS_NAME,'
              )
              .replace(
                'getModuleTreeNodeDropContainerClassName(dropPlacement)',
                "dropPlacement === 'inside' && MODULE_TREE_NODE_INSIDE_DROP_CLASS_NAME"
              )

            fs.writeFileSync(path, source)
          }
          NODE
          rm -f scripts/unify-study-boards-dnd.mjs
          npm exec prettier -- --write \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.tsx \
            src/renderer/src/shared/ui/ModuleTreeDndFeedback.test.tsx \
            src/renderer/src/modules/study/components/StudyTree.tsx \
            src/renderer/src/modules/boards/components/BoardTree.tsx \
            src/renderer/src/modules/boards/BoardsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - name: Commit verified changes
        shell: bash
        run: |
          set -e
          rm -f .github/workflows/unify-study-boards-dnd.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Унифицировать drag-and-drop сайдбаров"
          git push origin HEAD:agent/unify-study-boards-dnd
