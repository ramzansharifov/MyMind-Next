name: Apply reliable active formatting state

on:
  push:
    branches: [agent/visible-active-format-controls]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/fix-rich-text-active-state.cjs
      - name: Commit final active state fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml
          git add src/renderer/src/assets/main.css
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
          git rm scripts/fix-rich-text-active-state.cjs
          git rm test-coverage-diagnostic.log
          git commit -m "Use reliable active formatting state"
          git push
