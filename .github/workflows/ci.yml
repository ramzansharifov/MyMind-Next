name: Finalize boards UI

on:
  push:
    branches: [agent/finalize-boards-module]
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-boards-module
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply and verify final integration
        shell: bash
        run: |
          set +e
          {
            node scripts/finalize-boards-ui.mjs
            npm run format
            npm run native:node
            npm run lint
            npm run typecheck
            npm run test:coverage
            npm run db:check
            npm run build:bundle
          } > boards-verification.log 2>&1
          status=$?

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            git add -A
            git commit -m "Record final boards verification failure"
            git push origin HEAD:agent/finalize-boards-module
            exit 0
          fi

          rm -f scripts/finalize-boards-ui.mjs boards-verification.log
          cat > .github/workflows/ci.yml <<'EOF'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run native:node
                - run: npm run format:check
                - run: npm run lint
                - run: npm run typecheck
                - run: npm run test:coverage
                - run: npm run db:check
                - run: npm run build:bundle
                - uses: actions/upload-artifact@v4
                  if: ${{ always() && hashFiles('coverage/**') != '' }}
                  with:
                    name: coverage
                    path: coverage
                    if-no-files-found: error
          EOF
          npm exec prettier -- --write .github/workflows/ci.yml
          git add -A
          git commit -m "Complete boards module integration"
          git push origin HEAD:agent/finalize-boards-module
