name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - run: npm run format:check
      - name: Prepare Prettier diff for diagnostics
        if: ${{ failure() }}
        shell: bash
        run: |
          npm run format
          git diff --binary > prettier.patch
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: prettier-diff
          path: prettier.patch
          if-no-files-found: error
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - uses: actions/upload-artifact@v4
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        with:
          name: coverage
          path: coverage
          if-no-files-found: error
