name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - name: Capture quote test output
        shell: bash
        run: npm run test:run -- src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx > quote-test.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: quote-test-log
          path: quote-test.log
          if-no-files-found: error
