name: Add boards instructions

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-instructions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply boards instructions and verify
        shell: bash
        run: |
          set -e

          node scripts/add-boards-instructions.mjs

          npm exec prettier -- --write \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts \
            src/renderer/src/modules/settings/instructions/LearningInstructions.tsx \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx \
            src/renderer/src/modules/settings/SettingsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx

          npm run native:node
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run db:check
          npm run build:bundle

          rm -f scripts/add-boards-instructions.mjs

          cat > .github/workflows/ci.yml <<'EOF'
          name: CI (manual)

          on:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run native:node
                - run: npm run format:check
                - run: npm run lint
                - run: npm run typecheck
                - run: npm run test:coverage
                - run: npm run db:check
                - run: npm run build:bundle
          EOF

          npm exec prettier -- --write .github/workflows/ci.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить инструкции модуля досок"
          git push origin HEAD:agent/boards-instructions
