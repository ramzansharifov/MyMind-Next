name: Diagnose boards instructions tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-instructions
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply source changes
        shell: bash
        run: |
          set -e
          node scripts/add-boards-instructions.mjs
          node scripts/fix-boards-instructions-lint.mjs
          rm -f scripts/add-boards-instructions.mjs scripts/fix-boards-instructions-lint.mjs
          npm exec prettier -- --write \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts \
            src/renderer/src/modules/settings/instructions/LearningInstructions.tsx \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx \
            src/renderer/src/modules/settings/SettingsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx \
            src/renderer/src/modules/study/StudyPage.tsx \
            src/renderer/src/modules/study/components/StudyHome.tsx \
            src/renderer/src/shared/ui/ModuleSidebar.tsx \
            src/renderer/src/shared/ui/module-sidebar-layout.ts
      - name: Diagnose affected tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm exec vitest -- run \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx \
            --reporter=json --outputFile=test-results.json > /dev/null 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            node <<'NODE' > test-summary.txt
          const fs = require('node:fs')
          const report = JSON.parse(fs.readFileSync('test-results.json', 'utf8'))
          const ansi = /\u001b\[[0-9;]*m/g
          const lines = []

          for (const suite of report.testResults ?? []) {
            for (const assertion of suite.assertionResults ?? []) {
              if (assertion.status !== 'failed') continue

              const raw = (assertion.failureMessages ?? []).join('\n').replace(ansi, '')
              const compact = raw.split('Ignored nodes:')[0].trim()
              lines.push(`${suite.name} :: ${assertion.fullName ?? assertion.title ?? 'failed test'}`)
              lines.push(compact.slice(0, 3500))
              lines.push('')
            }
          }

          process.stdout.write(lines.join('\n') || 'Vitest завершился с ошибкой без детального сообщения.')
          NODE
            {
              echo "Убрать справочный текст из контекстных меню модуля «Доски» и оставить в них только доступные действия. Добавить в Настройки → Инструкции полноценный каталог «Доски» с поиском, оглавлением и отдельными статьями."
              echo
              echo "## Временная диагностика тестов"
              echo '```text'
              cat test-summary.txt
              echo
              echo '```'
            } > pr-body.md
            gh pr edit 22 --body-file pr-body.md
            exit "$status"
          fi
