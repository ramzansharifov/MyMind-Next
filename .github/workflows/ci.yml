name: Finalize boards

on:
  push:
    branches: [agent/finalize-boards-module]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-boards-module
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply and verify integration
        shell: bash
        run: |
          set +e
          {
            node scripts/prepare-boards-repair.mjs
            node scripts/fix-boards-transform.mjs
            node scripts/apply-boards-module.mjs
            npm run format
            npm run db:generate -- --name boards
          } > boards-finalization.log 2>&1
          status=$?

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            git add boards-finalization.log
            git commit -m "Record boards finalization failure"
            git push origin HEAD:agent/finalize-boards-module
            exit 0
          fi

          rm -f \
            scripts/apply-boards-module.mjs \
            scripts/fix-boards-transform.mjs \
            scripts/prepare-boards-repair.mjs \
            boards-finalization.log \
            boards-integration-error.txt \
            boards-transform-error.txt \
            .boards-module-generated \
            .repair-boards-trigger \
            .finalize-boards-trigger

          git add -A
          git commit -m "Finalize boards module integration"
          git push origin HEAD:agent/finalize-boards-module
