name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - name: Run tests with captured output
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee test-coverage.log
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-coverage-log
          path: test-coverage.log
          if-no-files-found: error
      - run: npm run db:check
      - run: npm run build:bundle
      - uses: actions/upload-artifact@v4
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        with:
          name: coverage
          path: coverage
          if-no-files-found: error
