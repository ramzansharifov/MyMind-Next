name: Move quote control

on:
  push:
    branches: [agent/move-quote-to-text-section]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/move-quote-to-text-section.cjs
      - name: Commit layout change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
          git rm scripts/move-quote-to-text-section.cjs
          git commit -m "Move quote control into text section"
          git push
