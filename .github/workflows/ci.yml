name: Add boards instructions

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-instructions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply source changes
        shell: bash
        run: |
          set -e
          node scripts/add-boards-instructions.mjs
          node -e "const fs=require('node:fs');const p='src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace('  Save,\n',''))"
          npm exec prettier -- --write \
            scripts/add-boards-instructions.mjs \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts \
            src/renderer/src/modules/settings/instructions/LearningInstructions.tsx \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx \
            src/renderer/src/modules/settings/SettingsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx
      - name: Rebuild native dependencies for Node
        run: npm run native:node
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test coverage
        run: npm run test:coverage
      - name: Check database
        run: npm run db:check
      - name: Build renderer and Electron bundles
        run: npm run build:bundle
      - name: Commit verified changes
        shell: bash
        run: |
          set -e
          rm -f scripts/add-boards-instructions.mjs

          cat > .github/workflows/ci.yml <<'EOF'
          name: CI (manual)

          on:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run native:node
                - run: npm run format:check
                - run: npm run lint
                - run: npm run typecheck
                - run: npm run test:coverage
                - run: npm run db:check
                - run: npm run build:bundle
          EOF

          npm exec prettier -- --write .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить инструкции модуля досок"
          git push origin HEAD:agent/boards-instructions
