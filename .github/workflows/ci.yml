name: Verify board fullscreen mode

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-fullscreen
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format changed sources
        run: npm exec prettier -- --write src/renderer/src/modules/boards/components/BoardCanvas.tsx src/renderer/src/modules/boards/components/BoardCanvas.test.tsx src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - name: Restore manual CI and commit formatting
        shell: bash
        run: |
          set -e
          cat > .github/workflows/ci.yml <<'EOF'
          name: CI (manual)

          on:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run native:node
                - run: npm run format:check
                - run: npm run lint
                - run: npm run typecheck
                - run: npm run test:coverage
                - run: npm run db:check
                - run: npm run build:bundle
          EOF
          npm exec prettier -- --write .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Проверить полноэкранный режим доски"
          git push origin HEAD:agent/board-fullscreen
