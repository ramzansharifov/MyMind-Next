name: Boards trigger diagnostic

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  trigger:
    if: github.event.issue.number == 14
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-final-hotfix
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          date -u > .boards-runner-started
          git add .boards-runner-started
          git commit -m "Confirm boards runner trigger"
          git push origin HEAD:agent/boards-final-hotfix
