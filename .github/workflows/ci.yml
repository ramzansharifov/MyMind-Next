name: Apply instruction section navigation

on:
  push:
    branches: [agent/learning-instructions]

permissions:
  contents: write

jobs:
  apply-navigation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/learning-instructions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply navigation patch
        run: node .github/scripts/add-instruction-section-navigation.mjs
      - name: Format changed files
        run: >-
          npx prettier --write
          src/renderer/src/modules/settings/instructions/LearningInstructions.tsx
          src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
      - name: Restore CI and commit result
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml
          git add src/renderer/src/modules/settings/instructions/LearningInstructions.tsx
          git add src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
          git rm .github/scripts/add-instruction-section-navigation.mjs
          git commit -m "Add instruction section navigation"
          git push origin HEAD:agent/learning-instructions
