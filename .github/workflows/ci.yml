name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - name: Run tests and collect JSON
        id: tests
        continue-on-error: true
        run: npx vitest run --reporter=json --outputFile=test-results.json
      - name: Save concise failure report
        if: steps.tests.outcome == 'failure'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const report = JSON.parse(fs.readFileSync('test-results.json', 'utf8'))
          const failures = []

          for (const suite of report.testResults ?? []) {
            const failedAssertions = (suite.assertionResults ?? []).filter(
              (assertion) => assertion.status === 'failed'
            )

            for (const assertion of failedAssertions) {
              failures.push(
                [
                  `FILE: ${suite.name ?? 'unknown'}`,
                  `TEST: ${assertion.fullName ?? assertion.title ?? 'unknown'}`,
                  ...(assertion.failureMessages ?? [])
                ].join('\n')
              )
            }

            if (suite.status === 'failed' && failedAssertions.length === 0) {
              failures.push(
                [`FILE: ${suite.name ?? 'unknown'}`, ...(suite.message ? [suite.message] : [])].join(
                  '\n'
                )
              )
            }
          }

          fs.writeFileSync(
            'ci-test-failures.txt',
            failures.length > 0 ? failures.join('\n\n---\n\n') : JSON.stringify(report, null, 2)
          )
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-test-failures.txt
          git commit -m "[skip ci] Record failing test"
          git push origin HEAD:${{ github.head_ref }}
          exit 1
