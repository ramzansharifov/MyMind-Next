name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture transform failure
        shell: bash
        run: |
          set +e
          node scripts/fix-boards-transform.mjs > boards-transform-error.txt 2>&1
          fix_status=$?
          if [ "$fix_status" -eq 0 ]; then
            node scripts/apply-boards-module.mjs >> boards-transform-error.txt 2>&1
            transform_status=$?
          else
            transform_status=$fix_status
          fi
          git reset --hard HEAD
          printf "\nexit=%s\n" "$transform_status" >> boards-transform-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add boards-transform-error.txt
          git commit -m "[skip ci] Record boards transform failure"
          git push origin HEAD:${{ github.head_ref }}
          exit 1
