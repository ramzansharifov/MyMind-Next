name: Diagnose boards instructions lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-instructions
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply source changes
        shell: bash
        run: |
          set -e
          node scripts/add-boards-instructions.mjs
          node -e "const fs=require('node:fs');const p='src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts';fs.writeFileSync(p,fs.readFileSync(p,'utf8').replace('  Save,\n',''))"
          npm exec prettier -- --write \
            scripts/add-boards-instructions.mjs \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts \
            src/renderer/src/modules/settings/instructions/LearningInstructions.tsx \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx \
            src/renderer/src/modules/settings/SettingsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx
      - name: Diagnose lint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Убрать справочный текст из контекстных меню модуля «Доски» и оставить в них только доступные действия. Добавить в Настройки → Инструкции полноценный каталог «Доски» с поиском, оглавлением и отдельными статьями."
              echo
              echo "## Временная диагностика ESLint"
              echo '```text'
              tail -n 120 lint-output.txt
              echo '```'
            } > pr-body.md
            gh pr edit 22 --body-file pr-body.md
            exit "$status"
          fi
