name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - name: Capture full coverage output
        shell: bash
        run: npm run test:coverage > test-coverage-latest.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: test-coverage-latest-log
          path: test-coverage-latest.log
          if-no-files-found: error
