name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - run: npm run format:check
      - name: Prepare formatted sources for diagnostics
        if: ${{ failure() }}
        run: npx prettier --write src/renderer/src/assets/rich-text-quote.css src/renderer/src/main.tsx src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: formatted-sources
          path: |
            src/renderer/src/assets/rich-text-quote.css
            src/renderer/src/main.tsx
            src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
            src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
          if-no-files-found: error
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - uses: actions/upload-artifact@v4
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        with:
          name: coverage
          path: coverage
          if-no-files-found: error
