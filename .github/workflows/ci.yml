name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture integration failure
        shell: bash
        run: |
          set +e
          {
            echo '=== fix transform ==='
            node scripts/fix-boards-transform.mjs
            echo '=== apply transform ==='
            node scripts/apply-boards-module.mjs
            echo '=== install tldraw ==='
            npm install --save-exact tldraw@5.2.4 @tldraw/assets@5.2.4
            echo '=== format ==='
            npm run format
            echo '=== generate migration ==='
            npm run db:generate -- --name boards
          } > boards-integration-error.txt 2>&1
          status=$?
          git reset --hard HEAD
          printf "\nexit=%s\n" "$status" >> boards-integration-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add boards-integration-error.txt
          git commit -m "[skip ci] Record boards integration failure"
          git push origin HEAD:${{ github.head_ref }}
          exit 1
