name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  format-instructions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format instruction files
        run: >-
          npx prettier --write
          src/renderer/src/modules/settings/SettingsPage.tsx
          src/renderer/src/modules/settings/instructions/LearningInstructions.tsx
          src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
          src/renderer/src/modules/settings/instructions/learning-instruction-catalog.ts
      - name: Restore CI and commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          git rm -f .github/format-learning-instructions.trigger
          git rm -f .github/workflows/format-learning-instructions.yml
          git add .github/workflows/ci.yml
          git add src/renderer/src/modules/settings/SettingsPage.tsx
          git add src/renderer/src/modules/settings/instructions/LearningInstructions.tsx
          git add src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
          git add src/renderer/src/modules/settings/instructions/learning-instruction-catalog.ts
          git commit -m "Format learning instructions"
          git push
