name: Diagnose boards drag and study return

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-dnd-study-back
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Diagnose patch application
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          node -e "const fs=require('node:fs');const p='scripts/add-boards-dnd-study-back.mjs';const s=fs.readFileSync(p,'utf8');fs.writeFileSync(p,s.replace('\n  if (content.includes(replacement)) return\n','\n'))"
          node scripts/add-boards-dnd-study-back.mjs > apply-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Добавить drag-and-drop обычных папок и досок, защитить ветку «Обучение» и добавить возврат к исходному материалу."
              echo
              echo "## Временная диагностика применения патча"
              echo '```text'
              cat apply-output.txt
              echo '```'
            } > pr-body.md
            gh pr edit 24 --body-file pr-body.md
            exit "$status"
          fi
