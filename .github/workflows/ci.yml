name: Diagnose board fullscreen lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-fullscreen
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply instruction changes
        shell: bash
        run: |
          set -e
          node scripts/add-board-fullscreen.mjs
          rm -f scripts/add-board-fullscreen.mjs
          npm exec prettier -- --write \
            src/renderer/src/modules/boards/components/BoardCanvas.tsx \
            src/renderer/src/modules/boards/components/BoardCanvas.test.tsx \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
      - name: Diagnose lint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Добавить полноэкранный режим открытой доски без пересоздания tldraw, с возвратом кнопкой и клавишей Esc."
              echo
              echo "## Временная диагностика ESLint"
              echo '```text'
              tail -n 160 lint-output.txt
              echo '```'
            } > pr-body.md
            gh pr edit 23 --body-file pr-body.md
            exit "$status"
          fi
