name: Diagnose boards integration tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/boards-dnd-study-back
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply and format source changes
        shell: bash
        run: |
          set -e
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'scripts/add-boards-dnd-study-back.mjs'
          let source = fs.readFileSync(path, 'utf8')
          source = source.replace('\n  if (content.includes(replacement)) return\n', '\n')
          source = source.replace(
            "  `const boardDateFormatter = new Intl.DateTimeFormat('ru-RU', {`\n)",
            "  ``\n)"
          )
          fs.writeFileSync(path, source)
          NODE
          node scripts/add-boards-dnd-study-back.mjs
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'src/renderer/src/modules/boards/BoardsPage.tsx'
          const source = fs.readFileSync(path, 'utf8').replace(
            "import { Tooltip } from '../../shared/ui/tooltip'\n",
            ''
          )
          fs.writeFileSync(path, source)
          NODE
          rm -f scripts/add-boards-dnd-study-back.mjs
          npm exec prettier -- --write \
            src/main/repositories/boards.repository.ts \
            src/main/repositories/boards.repository.test.ts \
            src/renderer/src/modules/boards/BoardsPage.tsx \
            src/renderer/src/modules/boards/BoardsPage.test.tsx \
            src/renderer/src/modules/boards/components/BoardTree.tsx \
            src/renderer/src/modules/boards/lib/board-dnd.ts \
            src/renderer/src/modules/boards/lib/board-dnd.test.ts \
            src/renderer/src/modules/study/StudyPage.tsx \
            src/renderer/src/modules/study/StudyPage.resource-navigation.test.tsx \
            src/renderer/src/modules/settings/instructions/boards-instruction-catalog.ts \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
      - run: npm run native:node
      - name: Diagnose affected tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm exec vitest -- run \
            src/main/repositories/boards.repository.test.ts \
            src/renderer/src/modules/boards/BoardsPage.test.tsx \
            src/renderer/src/modules/boards/lib/board-dnd.test.ts \
            src/renderer/src/modules/study/StudyPage.resource-navigation.test.tsx \
            src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx \
            --reporter=json --outputFile=test-results.json > /dev/null 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            node <<'NODE' > test-summary.txt
          const fs = require('node:fs')
          const report = JSON.parse(fs.readFileSync('test-results.json', 'utf8'))
          const ansi = /\u001b\[[0-9;]*m/g
          const lines = []

          for (const suite of report.testResults ?? []) {
            for (const assertion of suite.assertionResults ?? []) {
              if (assertion.status !== 'failed') continue
              const raw = (assertion.failureMessages ?? []).join('\n').replace(ansi, '')
              const compact = raw.split('Ignored nodes:')[0].trim()
              lines.push(`${suite.name} :: ${assertion.fullName ?? assertion.title ?? 'failed test'}`)
              lines.push(compact.slice(0, 5000))
              lines.push('')
            }
          }

          process.stdout.write(lines.join('\n') || 'Vitest завершился с ошибкой без детального сообщения.')
          NODE
            {
              echo "Добавить drag-and-drop обычных папок и досок, защитить ветку «Обучение» и добавить возврат к исходному материалу."
              echo
              echo "## Временная диагностика тестов"
              echo '```text'
              cat test-summary.txt
              echo '```'
            } > pr-body.md
            gh pr edit 24 --body-file pr-body.md
            exit "$status"
          fi
