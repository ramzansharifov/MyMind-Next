name: CI diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:node
      - name: Capture full coverage output
        shell: bash
        run: |
          set +e
          npm run test:coverage > test-coverage-diagnostic.log 2>&1
          exit_code=$?
          printf '\nEXIT_CODE=%s\n' "$exit_code" >> test-coverage-diagnostic.log
          exit 0
      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f test-coverage-diagnostic.log
          git commit -m "Capture coverage diagnostic output"
          git push origin HEAD:${{ github.head_ref }}
