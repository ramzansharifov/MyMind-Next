name: CI

on:
  push:
    branches: [main, agent/repair-boards-module]
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/repair-boards-module
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Integrate boards module
        shell: bash
        run: |
          node scripts/prepare-boards-repair.mjs
          node scripts/fix-boards-transform.mjs
          node scripts/apply-boards-module.mjs
          npm install --save-exact tldraw@5.2.4 @tldraw/assets@5.2.4
          npm run format
          npm run db:generate -- --name boards
          rm -f \
            scripts/apply-boards-module.mjs \
            scripts/fix-boards-transform.mjs \
            scripts/prepare-boards-repair.mjs \
            boards-integration-error.txt \
            boards-transform-error.txt \
            .boards-module-generated \
            .repair-boards-trigger
          cat > .github/workflows/ci.yml <<'EOF'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            verify:
              runs-on: windows-latest
              timeout-minutes: 25
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm
                - run: npm ci
                - run: npm run native:node
                - run: npm run format:check
                - run: npm run lint
                - run: npm run typecheck
                - run: npm run test:coverage
                - run: npm run db:check
                - run: npm run build:bundle
                - uses: actions/upload-artifact@v4
                  if: ${{ always() && hashFiles('coverage/**') != '' }}
                  with:
                    name: coverage
                    path: coverage
                    if-no-files-found: error
          EOF
          npm exec prettier -- --write .github/workflows/ci.yml
      - name: Commit repaired integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair boards module integration"
          git push origin HEAD:agent/repair-boards-module
