name: Format learning instructions

on:
  push:
    branches: [agent/learning-instructions]

permissions:
  contents: write

jobs:
  format:
    if: ${{ hashFiles('.github/workflows/format-learning-instructions.yml') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format changed files
        run: >-
          npx prettier --write
          src/renderer/src/modules/settings/SettingsPage.tsx
          src/renderer/src/modules/settings/instructions/LearningInstructions.tsx
          src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
          src/renderer/src/modules/settings/instructions/learning-instruction-catalog.ts
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer/src/modules/settings/SettingsPage.tsx
          git add src/renderer/src/modules/settings/instructions/LearningInstructions.tsx
          git add src/renderer/src/modules/settings/instructions/LearningInstructions.test.tsx
          git add src/renderer/src/modules/settings/instructions/learning-instruction-catalog.ts
          git rm .github/workflows/format-learning-instructions.yml
          git commit -m "Format learning instructions"
          git push
