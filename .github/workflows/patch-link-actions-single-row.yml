name: Patch link actions layout

on:
  push:
    branches: [agent/link-actions-single-row]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/patch-link-actions-single-row.cjs
      - run: npx prettier --write src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
      - name: Commit final layout change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
          git rm scripts/patch-link-actions-single-row.cjs
          git rm .github/workflows/patch-link-actions-single-row.yml
          git commit -m "Place link actions in one row"
          git push
