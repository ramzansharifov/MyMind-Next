name: Apply stable active formatting state

on:
  push:
    branches: [agent/visible-active-format-controls]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node scripts/normalize-rich-text-active-state.cjs
      - run: npm ci
      - name: Format changed files
        run: >-
          npx prettier --write
          src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
          src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
      - name: Commit stable active state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
          git rm scripts/normalize-rich-text-active-state.cjs
          git rm .github/workflows/apply-stable-active-state.yml
          git commit -m "Use stable formatting active state"
          git push
