name: Apply formatting active-state fix

on:
  push:
    branches: [agent/fix-formatting-active-state]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ hashFiles('scripts/fix-formatting-active-state.cjs') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/fix-formatting-active-state.cjs
      - run: npx prettier --write src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
      - name: Commit active-state fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.tsx
          git add src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx
          git rm scripts/fix-formatting-active-state.cjs
          git rm .github/workflows/apply-formatting-active-state-fix.yml
          git commit -m "Fix formatting active-state rendering"
          git push
