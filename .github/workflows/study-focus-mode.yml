name: Capture study focus diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/study-focus-mode
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply and capture diagnostics
        shell: bash
        run: |
          set +e
          {
            node scripts/fix-study-focus-generator.mjs
            node scripts/add-study-focus-mode.mjs
            npm run format
          } > apply-output.txt 2>&1
          apply_status=$?

          npm run lint > lint-output.txt 2>&1
          lint_status=$?

          mkdir -p diagnostics
          {
            echo '=== APPLY STATUS ==='
            echo "$apply_status"
            echo
            echo '=== GENERATOR HEADER ==='
            head -n 12 scripts/add-study-focus-mode.mjs
            echo
            echo '=== GENERATED EFFECT SEARCH ==='
            grep -n -C 3 "setMode('read')" src/renderer/src/modules/study/components/StudyMaterialEditor.tsx || true
            echo
            echo '=== APPLY OUTPUT ==='
            cat apply-output.txt
            echo
            echo '=== LINT STATUS ==='
            echo "$lint_status"
            echo
            echo '=== LINT OUTPUT ==='
            cat lint-output.txt
          } > diagnostics/study-focus-lint.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/study-focus-lint.txt
          git commit -m "Добавить временную диагностику режима фокуса"
          git push origin HEAD:agent/study-focus-mode

          if [ "$apply_status" -ne 0 ]; then
            exit "$apply_status"
          fi
          exit "$lint_status"
