name: Diagnose study focus formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/study-focus-mode
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Diagnose implementation formatting
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          {
            node scripts/fix-study-focus-generator.mjs
            node scripts/add-study-focus-mode.mjs
            npm run format
          } > implementation-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Добавить полноэкранный режим чтения материала, сохранить его при переходе на связанную доску и обратно, предоставить возврат к материалу и выход из фокуса на доске. Унифицировать подсказки модуля досок через общий Radix Tooltip."
              echo
              echo "## Временная диагностика форматирования"
              echo '```text'
              tail -n 160 implementation-output.txt
              echo '```'
            } > pr-body.md
            gh pr edit 34 --body-file pr-body.md
            exit "$status"
          fi
