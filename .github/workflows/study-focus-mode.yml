name: Diagnose study focus tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/study-focus-mode
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Apply focus mode implementation
        shell: bash
        run: |
          set +e
          (
            set -e
            node scripts/fix-study-focus-generator.mjs
            node scripts/add-study-focus-mode.mjs
            npm run format
          ) > apply-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            cat apply-output.txt
            exit "$status"
          fi
      - run: npm run native:node
      - name: Diagnose tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          npm exec vitest -- run --reporter=json --outputFile=test-results.json > /dev/null 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            node <<'NODE' > test-summary.txt
          const fs = require('node:fs')
          const report = JSON.parse(fs.readFileSync('test-results.json', 'utf8'))
          const ansi = /\u001b\[[0-9;]*m/g
          const lines = []

          for (const suite of report.testResults ?? []) {
            if (suite.status === 'failed' && (suite.assertionResults?.length ?? 0) === 0) {
              lines.push(`${suite.name} :: suite failure`)
              lines.push(String(suite.message ?? '').replace(ansi, '').slice(0, 6000))
              lines.push('')
            }

            for (const assertion of suite.assertionResults ?? []) {
              if (assertion.status !== 'failed') continue
              const raw = (assertion.failureMessages ?? []).join('\n').replace(ansi, '')
              const compact = raw.split('Ignored nodes:')[0].trim()
              lines.push(`${suite.name} :: ${assertion.fullName ?? assertion.title ?? 'failed test'}`)
              lines.push(compact.slice(0, 6000))
              lines.push('')
            }
          }

          process.stdout.write(lines.join('\n') || 'Vitest завершился с ошибкой без детального сообщения.')
          NODE
            {
              echo "Добавить полноэкранный режим чтения материала, сохранить его при переходе на связанную доску и обратно, предоставить возврат к материалу и выход из фокуса на доске. Унифицировать подсказки модуля досок через общий Radix Tooltip."
              echo
              echo "## Временная диагностика тестов"
              echo '```text'
              cat test-summary.txt
              echo '```'
            } > pr-body.md
            gh pr edit 34 --body-file pr-body.md
            exit "$status"
          fi
