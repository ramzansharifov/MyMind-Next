name: Verify root border current color

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/root-border-current
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format changed files
        run: >-
          npm exec prettier -- --write
          src/renderer/src/shared/ui/ModuleTreeDndFeedback.tsx
          src/renderer/src/shared/ui/ModuleTreeDndFeedback.test.tsx
          .github/workflows/root-border-current.yml
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - name: Verify compiled current-color border
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          function collectCssFiles(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(directory, entry.name)
              return entry.isDirectory()
                ? collectCssFiles(fullPath)
                : fullPath.endsWith('.css')
                  ? [fullPath]
                  : []
            })
          }

          const cssFiles = collectCssFiles('out/renderer')
          const css = cssFiles.map((file) => fs.readFileSync(file, 'utf8')).join('\n')

          if (!css.includes('border-color:currentColor') && !css.includes('border-color: currentColor')) {
            throw new Error('Production CSS does not contain the border-current rule')
          }

          console.log(`Verified border-current in ${cssFiles.length} compiled CSS file(s)`)
          NODE
      - name: Remove temporary workflow and commit verified source
        shell: bash
        run: |
          set -e
          rm -f .github/workflows/root-border-current.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить цвет рамки корневой зоны"
          git push origin HEAD:agent/root-border-current
