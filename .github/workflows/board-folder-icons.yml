name: Diagnose board folder icons

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-folder-icons
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Diagnose implementation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          {
            node scripts/add-board-folder-icons.mjs
            npm run db:generate -- --name board_folder_icons
            node scripts/finalize-board-folder-icons.mjs
          } > implementation-output.txt 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "Добавить хранение и выбор иконок для обычных папок досок, наследование и синхронизацию иконок учебных папок, а также открытое и закрытое состояния стандартной папки."
              echo
              echo "## Временная диагностика"
              echo '```text'
              tail -n 120 implementation-output.txt
              echo '```'
            } > pr-body.md
            gh pr edit 33 --body-file pr-body.md
            exit "$status"
          fi
