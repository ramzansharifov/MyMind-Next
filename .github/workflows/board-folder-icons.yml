name: Verify board folder icons

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/board-folder-icons
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply folder icon implementation
        shell: bash
        run: |
          set -e
          node scripts/add-board-folder-icons.mjs
          npm run db:generate -- --name board_folder_icons
          node scripts/finalize-board-folder-icons.mjs
          npm run format
      - run: npm run native:node
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run db:check
      - run: npm run build:bundle
      - name: Commit verified source
        shell: bash
        run: |
          set -e
          rm -f scripts/add-board-folder-icons.mjs scripts/finalize-board-folder-icons.mjs .github/workflows/board-folder-icons.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить иконки папок досок"
          git push origin HEAD:agent/board-folder-icons
