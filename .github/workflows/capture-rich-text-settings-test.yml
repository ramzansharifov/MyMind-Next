name: Capture rich text settings test

on:
  push:
    branches: [agent/visible-active-format-controls]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture target test output
        shell: bash
        run: |
          set +e
          npx vitest run src/renderer/src/modules/study/components/rich-text/RichTextSettings.test.tsx --reporter=verbose > rich-text-settings-test.log 2>&1
          exit_code=$?
          printf '\nEXIT_CODE=%s\n' "$exit_code" >> rich-text-settings-test.log
          exit 0
      - name: Commit captured output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rich-text-settings-test.log
          git rm .github/workflows/capture-rich-text-settings-test.yml
          git commit -m "Capture rich text settings test output"
          git push
